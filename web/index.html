<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>voice · visualizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Live embodiment of the voice agent. Not a chat, not a control panel:
       it reflects the session the voice core broadcasts. -->
  <main class="stage">
    <div id="orb" class="orb" data-state="idle" aria-hidden="true"></div>
    <p id="state" class="state">connecting…</p>
    <p id="persona" class="persona"></p>
    <p id="transcript" class="transcript"></p>
  </main>
  <script src="app.js"></script>
</body>
</html>
